image: atlassian/default-image:latest

pipelines:
  branches:
    main:
      - step:
          name: Deployment (Development)
          deployment: Development
          runs-on:
            - corecoder.workspace
          script:
            # Create .ssh directory and add Bitbucket's host key
            - mkdir -p ~/.ssh
            - ssh-keyscan bitbucket.org >> ~/.ssh/known_hosts
            - chmod 600 ~/.ssh/known_hosts
            - echo "Bitbucket host key added to known_hosts"
            
            # Configure SSH key for connecting to your target server

            - echo "$KVM_KEY_NEW" | tr -d '\r' > ~/.ssh/id_rsa
            - chmod 600 ~/.ssh/id_rsa
            - echo "SSH key configured"
            
            # Execute the deployment command using the atlassian/ssh-run pipe
            - pipe: atlassian/ssh-run:0.8.1
              variables:
                SSH_USER: $SERVER_USER
                SERVER: $SERVER
                SSH_KEY: $SERVER_KEY
                COMMAND: 'cd /home/admin/pipelineScripts && sh nextorbit_deploy.sh > nexorbit.log 2>&1'
                DEBUG: 'true'
            
            - echo "Deployment step completed"
